# PEP 770

- common location in `*.dist-info/sboms`
- any SBOM format
- whatever you need in it

---
<section style="font-size: 97%;">

```bash [1,6-11|10]
$ cat .../site-packages/setuptools-65.5.1.dist-info/sboms/bom.json
{
  "bomFormat": "CycloneDX",
  "specVersion": "1.6",
  "components": [
    {
      "type": "library",
      "name": "python3.11-setuptools",
      "version": "65.5.1-3.el9",
      "purl": "pkg:rpm/redhat/python3.11-setuptools@65.5.1-3.el9?arch=src"
    }
  ]
}
```
